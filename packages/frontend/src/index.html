        }
    </script>

    <script data-cfasync="false">window.nitroAds = window.nitroAds || {
        createAd: function () {
            return new Promise(e => {
                window.nitroAds.queue.push(["createAd", arguments, e])
            })
        }, addUserToken: function () {
            window.nitroAds.queue.push(["addUserToken", arguments])
        }, queue: []
    };</script>
    <script data-cfasync="false">
        // Failsafe in case script cannot load due to bad cache
        window.addEventListener('error', (event) => {
            if (window.xivgearLoadStarted) {
                // If it actually loaded successfully, then this error event is just noise.
                return;
            }
            const target = event.target;
            if (target && target.tagName.toLowerCase() === 'script') {
                const scriptSrc = target.src;
                if (scriptSrc?.includes('main') && scriptSrc?.includes('.js')) {
                    console.error("Main script load appears to have failed", event);
                    document.querySelector('#content-area').replaceChildren(`載入主程式時發生錯誤。頁面將在 5 秒後自動重新載入。請檢查瀏覽器主控台以獲取更多詳情。`);
                    setTimeout(() => {
                        const newLoc = new URL(document.location.toString());
                        newLoc.searchParams.set("_cacheBust", Math.floor(Math.random() * 1_000_000).toString());
                        document.location = newLoc.toString();
                        umami?.track('mainScriptLoadFail', {
                            scriptSrc: scriptSrc,
                        });
                    }, 5_000);
                }
            }
        }, {
            capture: true
        });
    </script>
    <link rel="preload" href="https://data.xivgear.app/BaseParams" as="fetch" crossorigin/>
    <link rel="preload" href="https://data.xivgear.app/Materia" as="fetch" crossorigin/>

        <h1>歡迎使用 XivGear！</h1>
        <p>xivgear.app 是一款進階的 FFXIV 配裝規劃與計算工具。不需要複雜的試算表，即可建立、比較、計算和模擬你的配裝方案。</p>
        <p>以下是部分功能特色：</p>
        <ul>
            <li>大多數職業都內建了 DPS 模擬功能，可在配裝編輯器中即時查看回饋。</li>
            <li>分享包含多個配裝的配裝表，讓其他玩家一眼就能瀏覽所有方案，無需逐個點開。</li>
            <li>可自動求解指定裝備的最佳鑲嵌和食物組合。</li>
        </ul>
        <p>祝你副本順利！別忘了到 <a href="https://thebalanceffxiv.com/">The Balance</a> 查看最佳配裝方案。</p>
